<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajedrez En Linea</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body class="theme-default">

  <!-- REPRODUCTOR DE MÚSICA DE FONDO -->
  <audio id="audio-fondo" loop>
    <source src="musica-default.mp3" type="audio/mpeg">
  </audio>

  <!-- CONTROL DE VOLUMEN FLOTANTE EN LA ESQUINA -->
  <div id="control-volumen">
    🔊
    <input type="range" id="vol-slider" min="0" max="100" step="10" value="20" onchange="cambiarVolumen()" oninput="cambiarVolumen()">
    <span id="vol-text">20%</span>
  </div>

  <header>
    <div class="header-titulo">AJEDREZ EN LINEA</div>
  </header>

  <!-- PANTALLA DE BIENVENIDA -->
  <div id="modal-inicio" class="modal-overlay">
    <div class="modal-box" style="background: transparent; border: none; box-shadow: none;">
      <h1 style="font-size: 40px; margin-bottom: 10px; text-shadow: 2px 2px 4px #000; color: white;">BIENVENIDOS AL AJEDREZ EN LINEA</h1>
      <p style="font-size: 18px; margin-bottom: 30px; text-shadow: 1px 1px 2px #000; color: white;">Demuestra tu destreza estrategica.</p>
      <button class="btn-success" style="font-size: 24px; padding: 15px 40px;" onclick="cerrarBienvenida()">SIGUIENTE</button>
    </div>
  </div>

  <!-- MODALES DE RESULTADOS -->
  <div id="modal-victoria" class="modal-overlay oculto">
    <div class="modal-box">
      <h1 style="color: #ffc107; font-size: 36px; margin-bottom: 20px;">VICTORIA</h1>
      <p id="msg-victoria" style="margin-bottom: 20px; font-size: 18px;"></p>
      <button class="btn-primary" onclick="cerrarYReiniciar()">CONTINUAR</button>
    </div>
  </div>
  <div id="modal-derrota" class="modal-overlay oculto">
    <div class="modal-box">
      <h1 style="color: #dc3545; font-size: 36px; margin-bottom: 20px;">DERROTA</h1>
      <p style="margin-bottom: 20px; font-size: 18px;">Tu rey ha sido derrotado. Intentalo de nuevo.</p>
      <button class="btn-primary" onclick="cerrarYReiniciar()">INTENTAR DE NUEVO</button>
    </div>
  </div>
  <div id="modal-empate" class="modal-overlay oculto">
    <div class="modal-box">
      <h1 style="color: #17a2b8; font-size: 36px; margin-bottom: 20px;">EMPATE</h1>
      <p id="msg-empate" style="margin-bottom: 20px; font-size: 18px;"></p>
      <button class="btn-primary" onclick="cerrarYReiniciar()">NUEVA PARTIDA</button>
    </div>
  </div>

  <div id="modal-coronacion" class="modal-overlay oculto">
    <div class="modal-box">
      <h2>Elige tu pieza:</h2>
      <div style="display:flex; gap:15px; justify-content:center; margin-top:20px;">
        <button class="btn-corona" data-pieza="q" style="background:none; border:none; cursor:pointer;"><img id="img-corona-q" style="height:60px;"></button>
        <button class="btn-corona" data-pieza="r" style="background:none; border:none; cursor:pointer;"><img id="img-corona-r" style="height:60px;"></button>
        <button class="btn-corona" data-pieza="b" style="background:none; border:none; cursor:pointer;"><img id="img-corona-b" style="height:60px;"></button>
        <button class="btn-corona" data-pieza="n" style="background:none; border:none; cursor:pointer;"><img id="img-corona-n" style="height:60px;"></button>
      </div>
    </div>
  </div>

  <div class="main-wrapper">
    
    <!-- PANEL IZQUIERDO -->
    <div class="panel">
      <div class="seccion-scroll">
        <h3>Oponentes</h3>
        <div class="lista-scroll" id="lista-bots"></div>
      </div>
      
      <div class="seccion-scroll">
        <h3>Cementerio</h3>
        <div id="cementerio" class="lista-scroll cementerio-grid"></div>
      </div>
    </div>

    <!-- CENTRO: TABLERO Y CONTROLES -->
    <div class="content">
      <div class="tablero">
        <div class="ajedrez" id="tablero-rejilla"></div>
      </div>

      <div class="controles-tablero" id="area-botones" style="margin-top: 10px;">
        <button class="btn-success" id="btn-jugar" style="font-size: 18px; padding: 12px 40px;" onclick="empezarJuego()">¡JUGAR AHORA!</button>
        <button class="btn-primary oculto" id="btn-equipo" onclick="cambiarEquipo()">Cambiar Equipo (B/N)</button>
        <button class="btn-danger oculto" id="btn-reiniciar" onclick="reiniciarPartidaManual()">Reiniciar Tablero</button>
      </div>
    </div>

    <!-- PANEL DERECHO CON GUÍA FLOTANTE A SU LADO -->
    <div class="panel" style="position: relative;">
      
      <!-- Temas -->
      <div class="seccion-scroll" style="flex: 0 0 40%;">
        <h3>Temas Visuales</h3>
        <div class="lista-scroll" id="lista-temas"></div>
      </div>

      <!-- Historial -->
      <div class="seccion-scroll" style="flex: 1 1 auto;">
        <h3>Registro de Jugadas</h3>
        <div class="lista-scroll" id="historial"></div>
      </div>

      <!-- GUÍA INTEGRADA AL ESCENARIO (Cajas individuales) -->
      <div id="guia-flotante-derecha"></div>

    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script>
    const BOTS = [
        { id: 1, nombre: "Abel", diff: 1 },
        { id: 2, nombre: "Canelita", diff: 3 },
        { id: 3, nombre: "Bugs Bunny", diff: 6 }, 
        { id: 4, nombre: "Luigi", diff: 8 },
        { id: 5, nombre: "Warden", diff: 10 },
        { id: 6, nombre: "Dr. Zomboss", diff: 12 },
        { id: 7, nombre: "Anonymous", diff: 15 }
    ];

    const TEMAS = [
        { id: 'default', nombre: "Clásico" },
        { id: 'cozy', nombre: "Cozy" },
        { id: 'oscuro', nombre: "Elegante" },
        { id: 'tema4', nombre: "Mario Bros" },
        { id: 'tema5', nombre: "Minecraft" },
        { id: 'tema6', nombre: "Plantas vs Zombies" },
        { id: 'tema7', nombre: "Hacker" },
        { id: 'tema8', nombre: "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;" }
    ];

    let juegoIniciado = false;
    let equipoJugador = 'w'; 
    let botActual = 1; 
    let botPensando = false;
    let movimientoPendiente = null;
    let temaActual = 'default'; 
    let piezasCapturadas = []; 
    
    const juego = new Chess();
    const tableroHTML = document.getElementById('tablero-rejilla');
    const historialDiv = document.getElementById('historial');

    const sonidoMover = new Audio('mover-default.mp3');
    const sonidoCaptura = new Audio('captura-default.mp3');
    const sonidoCapturaBlanca = new Audio('captura-blanca-default.mp3'); 
    const sonidoJaque = new Audio('jaque-default.mp3');
    const sonidoSplash = new Audio('splash-tema6.mp3'); 

    sonidoMover.volume = 0.5;   
    sonidoCaptura.volume = 0.5;
    sonidoCapturaBlanca.volume = 0.5;
    sonidoJaque.volume = 0.5;
    sonidoSplash.volume = 0.6; 

    function getArchivoPieza(letraPieza, colorIngles) {
        if (!letraPieza) return "";
        let prefijo = (temaActual === 'default' || temaActual === 'oscuro' || temaActual === 'tema8') ? '' : `${temaActual}-`;
        
        if (colorIngles === 'w') {
            const blancas = { p: 'peon-blanco.png', n: 'caballo-blanco.png', b: 'alfil-blanco.png', r: 'torre-blanca.png', q: 'reina-blanca.png', k: 'rey-blanco.png' };
            return prefijo + blancas[letraPieza];
        } else {
            const negras = { p: 'peon-negro.png', n: 'caballo-negro.png', b: 'alfil-negro.png', r: 'torre-negra.png', q: 'reina-negra.png', k: 'rey-negro.png' };
            return prefijo + negras[letraPieza];
        }
    }

    function renderGuiaPiezas() {
        const piezasInfo = [
            { tipo: 'p', nombre: 'Peón' },
            { tipo: 'n', nombre: 'Caballo' },
            { tipo: 'b', nombre: 'Alfil' },
            { tipo: 'r', nombre: 'Torre' },
            { tipo: 'q', nombre: 'Reina' },
            { tipo: 'k', nombre: 'Rey' }
        ];
        let html = '';
        piezasInfo.forEach(p => {
            html += `
            <div class="guia-item-transparente">
                <div class="guia-imgs-transparente">
                    <img src="${getArchivoPieza(p.tipo, 'w')}">
                    <img src="${getArchivoPieza(p.tipo, 'b')}">
                </div>
                <div class="guia-texto-transparente">${p.nombre}</div>
            </div>`;
        });
        document.getElementById('guia-flotante-derecha').innerHTML = html;
    }

    function cambiarVolumen() {
        let slider = document.getElementById('vol-slider');
        let audioFondo = document.getElementById('audio-fondo');
        audioFondo.volume = slider.value / 100; 
        document.getElementById('vol-text').innerText = slider.value + '%';
    }

    window.onload = () => {
        document.getElementById('vol-slider').value = 20;
        cambiarVolumen(); 
        renderBots();
        renderTemas();
        renderGuiaPiezas(); 
        dibujarTableroVacio();
    };

    function cerrarBienvenida() {
        document.getElementById('modal-inicio').classList.add('oculto');
        document.getElementById('audio-fondo').play().catch(e => console.log("Audio bloqueado"));
    }

    function empezarJuego() {
        document.getElementById('audio-fondo').play().catch(e => console.log("Audio bloqueado"));
        document.getElementById('btn-jugar').classList.add('oculto');
        document.getElementById('btn-equipo').classList.remove('oculto');
        document.getElementById('btn-reiniciar').classList.remove('oculto');

        juegoIniciado = true;
        piezasCapturadas = [];
        renderCementerio();
        juego.reset();
        dibujarTablero(true); 
    }

    function renderBots() {
        let html = '';
        BOTS.forEach((b) => {
            let clase = 'item-lista';
            if(botActual === b.id) clase += ' activo';
            
            let estiloFondo = `
                background: linear-gradient(to right, rgba(0, 0, 0, 0.65) 45%, rgba(0, 0, 0, 0) 100%), url('bot-${b.id}.png') right center / cover no-repeat;
                color: #ffffff; 
                border: 1px solid var(--borde);
            `;

            html += `
            <div class="${clase}" style="${estiloFondo}" onclick="seleccionarBot(${b.id})">
                <div class="item-info" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.8); position: relative; z-index: 2;">
                    <strong>${b.nombre}</strong>
                    <span style="font-size:12px; color: #eeeeee;">Dificultad: ${b.diff}</span>
                </div>
            </div>`;
        });
        document.getElementById('lista-bots').innerHTML = html;
    }

    function seleccionarBot(id) {
        botActual = id;
        renderBots();
        if(juegoIniciado) {
            piezasCapturadas = [];
            renderCementerio();
            juego.reset(); 
            dibujarTablero(true); 
            historialDiv.innerHTML='';
        }
    }

    function registrarVictoria() {
        document.getElementById('msg-victoria').innerText = "¡Excelente partida! Has derrotado a tu oponente.";
    }

    function renderTemas() {
        let html = '';
        TEMAS.forEach((t) => {
            let estilo = (temaActual === t.id) ? 'font-weight:bold; color:#ffc107; border-color:#ffc107;' : '';
            html += `<div style="padding:5px 0; cursor:pointer; transition:0.3s; ${estilo}" 
                          onclick="aplicarTema('${t.id}')">
                        ${t.nombre}
                     </div>`;
        });
        document.getElementById('lista-temas').innerHTML = html;
    }

    function aplicarTema(idTema) {
        document.body.className = 'theme-' + idTema;
        temaActual = idTema;
        
        let audioFondo = document.getElementById('audio-fondo');
        audioFondo.src = `musica-${idTema}.mp3`;
        sonidoMover.src = `mover-${idTema}.mp3`;
        sonidoCaptura.src = `captura-${idTema}.mp3`;
        sonidoCapturaBlanca.src = `captura-blanca-${idTema}.mp3`; 
        sonidoJaque.src = `jaque-${idTema}.mp3`;
        
        if(!document.getElementById('modal-inicio').classList.contains('oculto') === false) {
            audioFondo.play().catch(e => console.log(e));
        }
        
        if(juegoIniciado) {
            dibujarTablero(false); 
            renderCementerio();
        } else {
            dibujarTableroVacio();
        }
        
        renderTemas();
        renderGuiaPiezas(); 
    }

    function cambiarEquipo() {
        if(!juegoIniciado) return;
        equipoJugador = equipoJugador === 'w' ? 'b' : 'w';
        piezasCapturadas = [];
        renderCementerio();
        juego.reset(); 
        historialDiv.innerHTML='';
        dibujarTablero(true);
        if(equipoJugador === 'b') setTimeout(realizarMovimientoBot, 1000);
    }

    function reiniciarPartidaManual() {
        if(!juegoIniciado) return;
        juego.reset();
        dibujarTablero(true);
        historialDiv.innerHTML='';
        piezasCapturadas = [];
        renderCementerio();
    }

    function dibujarTableroVacio() {
        tableroHTML.innerHTML = "";
        let cols = ['a','b','c','d','e','f','g','h'];
        if(equipoJugador === 'b') cols.reverse();
        
        for (let i = 8; i >= 1; i--) {
            let row = equipoJugador === 'w' ? i : 9 - i;
            for (let j = 0; j < 8; j++) {
                let colorClase = (row + j) % 2 !== 0 ? 'blanca' : 'negra';
                if(equipoJugador==='b') colorClase = (row + j) % 2 === 0 ? 'blanca' : 'negra';
                tableroHTML.innerHTML += `<div class="${colorClase}"></div>`;
            }
        }
    }

    function dibujarTablero(conAnimacion = false) {
        tableroHTML.innerHTML = "";
        let cols = ['a','b','c','d','e','f','g','h'];
        if(equipoJugador === 'b') cols.reverse();
        
        for (let i = 8; i >= 1; i--) {
            let row = equipoJugador === 'w' ? i : 9 - i;
            for (let j = 0; j < 8; j++) {
                let col = cols[j];
                let coord = col + row;
                let pieza = juego.get(coord);
                
                let colorClase = (row + j) % 2 !== 0 ? 'blanca' : 'negra';
                if(equipoJugador==='b') colorClase = (row + j) % 2 === 0 ? 'blanca' : 'negra';
                
                let htmlCasilla = `<div id="${coord}" class="${colorClase}">`;
                if (j === 0) htmlCasilla += `<span class="coord-num">${row}</span>`;
                if (i === 8) htmlCasilla += `<span class="coord-letra">${col.toUpperCase()}</span>`;
                
                if (pieza) {
                    let delay = 0;
                    if(conAnimacion) {
                        if(pieza.color === 'w') delay = (row === 2) ? 0.2 : (row === 1 ? 0.4 : 0);
                        else delay = (row === 7) ? 0.6 : (row === 8 ? 0.8 : 0);
                    }
                    let extraClass = conAnimacion ? 'animacion-entrada' : '';
                    
                    let claseFacultad = pieza.color === 'w' ? 'pieza-blanca-img' : 'pieza-negra-img';
                    
                    if (temaActual === 'tema6' && (row === 4 || row === 5)) {
                        if (pieza.color === 'w') {
                            htmlCasilla += `<div class="base-agua"></div>`;
                        } else if (pieza.color === 'b') {
                            extraClass += ' pieza-sumergida';
                            htmlCasilla += `<div class="flotador-zombie"></div>`;
                        }
                    }

                    htmlCasilla += `<img src="${getArchivoPieza(pieza.type, pieza.color)}" class="pieza ${claseFacultad} ${extraClass}" style="animation-delay: ${delay}s" id="img-${coord}">`;
                }
                htmlCasilla += `</div>`;
                tableroHTML.innerHTML += htmlCasilla;
            }
        }
        asignarEventosClic();
    }

    function mostrarPuntosGuia(casillaOrigen) {
        document.querySelectorAll('.punto-guia').forEach(p => p.remove());
        const movs = juego.moves({ square: casillaOrigen, verbose: true });
        
        movs.forEach((mov) => {
            const dest = document.getElementById(mov.to);
            if (dest) {
                let file1 = casillaOrigen.charCodeAt(0), rank1 = parseInt(casillaOrigen[1]);
                let file2 = mov.to.charCodeAt(0), rank2 = parseInt(mov.to[1]);
                let dist = Math.max(Math.abs(file1-file2), Math.abs(rank1-rank2));
                let delay = dist * 0.05; 

                const punto = document.createElement('div');
                punto.classList.add('punto-guia');
                punto.style.animationDelay = `${delay}s`;
                dest.appendChild(punto);
            }
        });
    }

    let casillaSeleccionada = null;
    function asignarEventosClic() {
        document.querySelectorAll('.ajedrez div').forEach(c => {
            c.addEventListener('click', function() {
                if (!juegoIniciado || botPensando || juego.game_over()) return;
                if (juego.turn() !== equipoJugador) return;

                if (casillaSeleccionada) {
                    const movs = juego.moves({ square: casillaSeleccionada.id, verbose: true });
                    const movDeseado = movs.find(m => m.to === this.id);

                    if (movDeseado) {
                        document.querySelectorAll('.punto-guia').forEach(p => p.remove());
                        
                        if (movDeseado.flags.includes('p') || movDeseado.flags.includes('cp')) {
                            movimientoPendiente = { from: casillaSeleccionada.id, to: this.id };
                            abrirVista('modal-coronacion');
                            document.getElementById('img-corona-q').src = getArchivoPieza('q', equipoJugador);
                            document.getElementById('img-corona-r').src = getArchivoPieza('r', equipoJugador);
                            document.getElementById('img-corona-b').src = getArchivoPieza('b', equipoJugador);
                            document.getElementById('img-corona-n').src = getArchivoPieza('n', equipoJugador);
                            casillaSeleccionada.classList.remove('seleccionada'); casillaSeleccionada = null;
                            return; 
                        }

                        ejecutarMovimiento(casillaSeleccionada.id, this.id);
                    } else {
                        casillaSeleccionada.classList.remove('seleccionada');
                        if (this.querySelector('img')) {
                            casillaSeleccionada = this; this.classList.add('seleccionada');
                            mostrarPuntosGuia(this.id);
                        } else { casillaSeleccionada = null; document.querySelectorAll('.punto-guia').forEach(p => p.remove()); }
                    }
                } else {
                    if (this.querySelector('img')) {
                        casillaSeleccionada = this; this.classList.add('seleccionada');
                        mostrarPuntosGuia(this.id);
                    }
                }
            });
        });
    }

    document.querySelectorAll('.btn-corona').forEach(b => b.addEventListener('click', function() { 
        document.getElementById('modal-coronacion').classList.add('oculto');
        ejecutarMovimiento(movimientoPendiente.from, movimientoPendiente.to, this.getAttribute('data-pieza'));
        movimientoPendiente = null;
    }));

    function ejecutarMovimiento(origen, destino, promocion = 'q') {
        const mov = juego.move({ from: origen, to: destino, promotion: promocion });
        if(mov) {
            casillaSeleccionada = null;
            dibujarTablero();
            let imgDestino = document.getElementById('img-' + destino);
            if(imgDestino) {
                imgDestino.classList.add('efecto-bamboleo');
                setTimeout(() => imgDestino.classList.remove('efecto-bamboleo'), 300);
            }
            procesarFinDeTurno(mov);
            
            if(!juego.game_over() && juego.turn() !== equipoJugador) {
                setTimeout(realizarMovimientoBot, 500);
            }
        }
    }

function realizarMovimientoBot() {
        if(juego.game_over()) return;
        botPensando = true;
        historialDiv.innerHTML += `<p style="color:var(--color-texto-cajas); font-style:italic;" id="msg-pensando">El bot esta pensando...</p>`;
        historialDiv.scrollTop = historialDiv.scrollHeight;

        setTimeout(() => {
            const movs = juego.moves({ verbose: true });
            if(movs.length > 0) {
                
                let m;
                const botData = BOTS.find(b => b.id === botActual);
                const diff = botData ? botData.diff : 1;

                if (diff <= 3) {
                    m = movs[Math.floor(Math.random() * movs.length)];
                } else {
                    let bestMove = null;
                    let bestValue = -Infinity; // Empezamos en negativo por si hay jugadas malas
                    
                    const pieceValues = { 'p': 1, 'n': 3, 'b': 3, 'r': 5, 'q': 9, 'k': 100 };
                    const casillasCentro = ['d4', 'e4', 'd5', 'e5', 'c4', 'f4', 'c5', 'f5'];

                    movs.forEach(move => {
                        let moveValue = 0;
                        
                        // 1. Prioridad: Capturar
                        if (move.captured) {
                            moveValue += pieceValues[move.captured] * 10;
                        }
                        
                        // 2. Prioridad: Coronar
                        if (diff >= 8 && move.promotion) {
                            moveValue += 80;
                        }
                        
                        // 3. Prioridad: Jaques
                        if (diff >= 6) {
                            if (move.san.includes('#')) {
                                moveValue += 10000; // Si es mate, no le importa nada más
                            } else if (move.san.includes('+')) {
                                moveValue += 5; // Bono por molestar con jaque
                            }
                        }
                        
                        // 4. Centro
                        if (diff >= 10) {
                            if (casillasCentro.includes(move.to)) {
                                moveValue += 2;
                            }
                        }

                        // --- 5. NUEVO: INSTINTO DE SUPERVIVENCIA (Dificultad 8+) ---
                        // El bot evitará suicidarse a menos que sea para dar Jaque Mate
                        if (diff >= 8 && !move.san.includes('#')) {
                            
                            // Simulamos la jugada en la mente del bot
                            juego.move(move.san);
                            
                            // Calculamos si el jugador (tú) puede capturar a la pieza que el bot acaba de mover
                            let respuestasJugador = juego.moves({ verbose: true });
                            let meComen = false;
                            
                            for (let i = 0; i < respuestasJugador.length; i++) {
                                // Si alguno de tus movimientos termina en la casilla donde el bot se paró...
                                if (respuestasJugador[i].to === move.to) {
                                    meComen = true;
                                    break;
                                }
                            }
                            
                            // Deshacemos la simulación para volver al presente
                            juego.undo();

                            // Si la jugada resulta en muerte segura, la penalizamos fuertemente
                            if (meComen) {
                                // Le restamos el valor de su propia pieza multiplicada por 11.
                                // Así, si cambia un Caballo (30 puntos) por otro Caballo (resta 33 puntos), 
                                // preferirá no hacerlo a menos que no tenga otra opción.
                                moveValue -= (pieceValues[move.piece] * 11);
                            }
                        }
                        
                        // Añadimos un pequeño decimal aleatorio para que sus partidas sean variadas
                        moveValue += Math.random();

                        if (moveValue > bestValue) {
                            bestValue = moveValue;
                            bestMove = move;
                        }
                    });
                    
                    m = bestMove || movs[Math.floor(Math.random() * movs.length)];
                }

                juego.move(m);
                document.getElementById('msg-pensando').remove();
                dibujarTablero();
                
                let imgDestino = document.getElementById('img-' + m.to);
                if(imgDestino) {
                    imgDestino.classList.add('efecto-bamboleo');
                    setTimeout(() => imgDestino.classList.remove('efecto-bamboleo'), 300);
                }
                
                procesarFinDeTurno(m);
            }
            botPensando = false;
        }, 800);
    }

    function procesarFinDeTurno(mov) {
        document.querySelectorAll('.en-jaque').forEach(c => c.classList.remove('en-jaque'));
        
        if (temaActual === 'tema6' && (mov.to.includes('4') || mov.to.includes('5'))) {
            sonidoSplash.currentTime = 0; 
            sonidoSplash.play().catch(e=>console.log(e));
        }

        if (mov.captured) {
            let colorCapturado = mov.color === 'w' ? 'b' : 'w'; 
            piezasCapturadas.push({ type: mov.captured, color: colorCapturado });
            renderCementerio();
        }

        let isCaptura = mov.flags.includes('c') || mov.flags.includes('e');
        if (isCaptura) {
            if (mov.color === 'w') {
                sonidoCapturaBlanca.currentTime = 0; 
                sonidoCapturaBlanca.play().catch(e=>console.log(e));
            } else {
                sonidoCaptura.currentTime = 0; 
                sonidoCaptura.play().catch(e=>console.log(e));
            }
            historialDiv.innerHTML += `<p class="jugada-captura">Captura en ${mov.to.toUpperCase()}</p>`;
        } else {
            sonidoMover.currentTime = 0; sonidoMover.play().catch(e=>console.log(e));
            historialDiv.innerHTML += `<p class="jugada-normal">Movimiento a ${mov.to.toUpperCase()}</p>`;
        }

        if(juego.game_over()) {
            marcarReyEnJaque();
            setTimeout(() => {
                if(juego.in_checkmate()) {
                    let ganadorW = juego.turn() === 'b';
                    if((ganadorW && equipoJugador === 'w') || (!ganadorW && equipoJugador === 'b')) {
                        registrarVictoria();
                        historialDiv.innerHTML += `<div class="texto-destacado-victoria">HAS DERROTADO AL BOT</div>`;
                        abrirVista('modal-victoria');
                    } else {
                        historialDiv.innerHTML += `<div class="texto-destacado-derrota">TU REY HA SIDO DERROTADO</div>`;
                        abrirVista('modal-derrota');
                    }
                } else {
                    let razon = "Falta de material o repeticion.";
                    if(juego.in_stalemate()) razon = "Rey Ahogado. No tienes movimientos legales pero no estas en jaque.";
                    if(juego.in_threefold_repetition()) razon = "Repeticion de la misma posicion 3 veces.";
                    
                    document.getElementById('msg-empate').innerText = razon;
                    historialDiv.innerHTML += `<div class="texto-destacado-empate">EMPATE: ${razon.toUpperCase()}</div>`;
                    abrirVista('modal-empate');
                }
                renderBots();
            }, 1500);
        } else if (juego.in_check()) {
            marcarReyEnJaque();
            sonidoJaque.currentTime = 0; sonidoJaque.play().catch(e=>console.log(e));
            historialDiv.innerHTML += `<p style="color:#d9534f; font-weight:bold;">JAQUE</p>`;
        }
        historialDiv.scrollTop = historialDiv.scrollHeight;
    }

    function renderCementerio() {
        let html = '';
        piezasCapturadas.forEach(pieza => {
            let imagenSrc = getArchivoPieza(pieza.type, pieza.color);
            html += `<img src="${imagenSrc}" class="pieza-muerta animacion-entrada">`;
        });
        document.getElementById('cementerio').innerHTML = html;
        let cem = document.getElementById('cementerio');
        cem.scrollTop = cem.scrollHeight;
    }

    function marcarReyEnJaque() {
        let t = juego.turn();
        let cols = ['a','b','c','d','e','f','g','h'];
        for (let i=1; i<=8; i++) {
            for (let j=0; j<8; j++) {
                let p = juego.get(cols[j]+i);
                if (p && p.type === 'k' && p.color === t) {
                    let el = document.getElementById(cols[j]+i);
                    if(el) el.classList.add('en-jaque');
                }
            }
        }
    }

    function abrirVista(id) {
        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('oculto'));
        document.getElementById(id).classList.remove('oculto');
    }
    function cerrarVistas() {
        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('oculto'));
    }
    function cerrarYReiniciar() {
        cerrarVistas();
        reiniciarPartidaManual();
    }
  </script>
</body>
</html>
